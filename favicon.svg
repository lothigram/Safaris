<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <!-- Definitions for gradients and clips -->
  <defs>
    <!-- Sunset gold to burnt orange circular background gradient -->
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCC66" />
      <stop offset="60%" stop-color="#C96A2B" />
      <stop offset="100%" stop-color="#2B1A12" />
    </linearGradient>
    <!-- Clip-path to make it a perfect round radius circular icon -->
    <clipPath id="circleClip">
      <circle cx="64" cy="64" r="60" />
    </clipPath>
  </defs>

  <!-- Outer Circle border highlight -->
  <circle cx="64" cy="64" r="62" fill="none" stroke="#F2B84B" stroke-width="2" opacity="0.8" />

  <!-- Main rounded clipped region -->
  <g clip-path="url(#circleClip)">
    <!-- Sunset light gradient background -->
    <rect x="0" y="0" width="100%" height="100%" fill="url(#sunsetGrad)" />
    
    <!-- Soft glowing ambient sun in the background -->
    <circle cx="64" cy="70" r="32" fill="#F2B84B" opacity="0.65" />

    <!-- Distant flat savannah plain ground silhouette -->
    <path d="M 0,105 Q 64,101 128,105 L 128,128 L 0,128 Z" fill="#2B1A12" />

    <!-- Detailed artisan silhouette of the Safari Acacia Tree -->
    <!-- Trunk -->
    <path d="M 64,106 L 64,80 
             M 64,88 Q 50,78 40,78 
             M 64,83 Q 76,72 84,72 
             M 64,80 Q 56,66 48,64 
             M 64,80 Q 72,66 80,64" 
          stroke="#1A100B" stroke-width="5" stroke-linecap="round" fill="none" />
          
    <!-- Broad, flat acacia canopy silhouettes -->
    <ellipse cx="40" cy="76" rx="14" ry="4" fill="#1A100B" />
    <ellipse cx="84" cy="70" rx="16" ry="5" fill="#1A100B" />
    
    <ellipse cx="46" cy="62" rx="20" ry="5" fill="#1A100B" />
    <ellipse cx="80" cy="61" rx="22" ry="6" fill="#1A100B" />
    
    <ellipse cx="64" cy="52" rx="30" ry="7" fill="#1A100B" />
  </g>
</svg>
